<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
</head>
<body style="margin:0; background:#000;">
    <video id="p" class="video-js vjs-big-play-centered" controls style="width:100vw; height:100vh;"></video>
    <script>
        const q = new URLSearchParams(window.location.search);
        const player = videojs('p');
        async function play(dId, eps) {
            try {
                // PAKAI API FREEREELS STREAM
                const res = await fetch(`https://api.sonzaix.indevs.in/freereels/stream?dramaId=${dId}&episode=${eps}`);
                const s = await res.json();
                const v = s.data.videoList.find(x => x.encode === 'H264') || s.data.videoList[0];
                player.src({ src: v.playUrl, type: 'application/x-mpegURL' });
                player.play();
                player.one('ended', () => play(dId, parseInt(eps) + 1));
            } catch(e) { console.error(e); }
        }
        if(q.get('dramaId')) play(q.get('dramaId'), q.get('episode'));
    </script>
</body>
</html>
