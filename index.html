<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dramaxofort Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: sans-serif; 
            overflow: hidden; /* Biar tidak bisa digeser-geser */
        }
        /* Desain Layar Tegak (9:16) ala TikTok */
        .p-box { 
            width: 100%; 
            height: 100vh; 
            max-width: 500px; /* Pas untuk ukuran HP */
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            position: relative;
        }
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* Biar subtitle tidak kepotong */
            outline: none; 
        }
        /* Tombol melayang di bawah layar */
        .btn-float { 
            position: absolute; 
            bottom: 30px; 
            padding: 10px 25px; 
            background: rgba(0, 255, 255, 0.8); 
            color: #000; 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 50px; 
            z-index: 10;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>
    <div class="p-box" id="player-container">
        <span style="color:#0ff;">⏳ Memuat Video...</span>
    </div>
    
    <a href="https://t.me/dramaxofort_bot" class="btn-float">⬅️ KEMBALI KE BOT</a>

    <script>
        const u = new URLSearchParams(window.location.search);
        const s = u.get('srv'), id = u.get('id'), e = u.get('eps');

        if (s && id && e) {
            let apiLink = "";
            if (s === "melolo") apiLink = `https://api.sonzaix.indevs.in/melolo/stream/${e}`;
            else if (s === "meloshort") apiLink = `https://api.sonzaix.indevs.in/meloshort/stream?dramaId=${id}&episodeId=${e}`;
            else if (s === "goodshort") apiLink = `https://api.sonzaix.indevs.in/goodshort/stream?bookId=${e}`;
            else if (s === "dramawave") apiLink = `https://api.sonzaix.indevs.in/dramawave/stream?dramaId=${id}&episode=${e}`;
            else if (s === "reelshort") apiLink = `https://api.sonzaix.indevs.in/reelshort/stream?bookId=${id}&chapterId=${e}`;
            else if (s === "freereels") apiLink = `https://api.sonzaix.indevs.in/freereels/stream?dramaId=${id}&episode=${e}`;
            else if (s === "netshort") apiLink = `https://api.sonzaix.indevs.in/netshort/stream?dramaId=${e}`;
            else if (s === "dramabox") apiLink = `https://api.sonzaix.indevs.in/dramabox/stream?dramaId=${id}&episodeIndex=${e}`;

            fetch(apiLink)
                .then(response => response.json())
                .then(data => {
                    let realVideoUrl = "";

                    // Cek lokasi video
                    if (data.data && data.data.h264) realVideoUrl = data.data.h264;
                    else if (data.data && data.data.video_list && data.data.video_list.h264) realVideoUrl = data.data.video_list.h264;
                    else if (data.data && data.data.url) realVideoUrl = data.data.url;
                    else if (data.data && data.data.stream_url) realVideoUrl = data.data.stream_url;
                    else if (data.h264) realVideoUrl = data.h264;

                    // Mesin Pencari Otomatis jika masih belum ketemu
                    if (!realVideoUrl) {
                        function scanForVideo(obj) {
                            if (realVideoUrl) return;
                            for (let k in obj) {
                                if (typeof obj[k] === 'string' && (obj[k].includes('.mp4') || obj[k].includes('.m3u8'))) {
                                    if (obj[k].startsWith('http')) { realVideoUrl = obj[k]; return; }
                                } else if (typeof obj[k] === 'object' && obj[k] !== null) { scanForVideo(obj[k]); }
                            }
                        }
                        scanForVideo(data);
                    }

                    // EKSEKUSI PEMUTARAN VIDEO
                    if (realVideoUrl) {
                        const container = document.getElementById('player-container');
                        container.innerHTML = `<video id="my-video" controls autoplay playsinline></video>`;
                        const video = document.getElementById('my-video');

                        // Cek apakah video berformat .m3u8 (HLS)
                        if (realVideoUrl.includes('.m3u8')) {
                            if (Hls.isSupported()) {
                                const hls = new Hls();
                                hls.loadSource(realVideoUrl);
                                hls.attachMedia(video);
                                hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
                            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                                video.src = realVideoUrl;
                                video.addEventListener('loadedmetadata', function() { video.play(); });
                            }
                        } else {
                            // Jika format .mp4 biasa
                            video.src = realVideoUrl;
                            video.play();
                        }
                    } else {
                        document.getElementById('player-container').innerHTML = `<span style="color:red;">⚠️ Link Video gagal diekstrak.</span>`;
                    }
                })
                .catch(err => {
                    document.getElementById('player-container').innerHTML = `❌ Gagal memuat API.`;
                });
        }
    </script>
</body>
</html>
