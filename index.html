<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dramaxofort Player</title>
    <style>
        body { margin: 0; background: #000; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .p-box { width: 100%; max-width: 800px; aspect-ratio: 16/9; background: #111; border: 2px solid #0ff; border-radius: 8px; display: flex; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box;}
        video { width: 100%; height: 100%; outline: none; border-radius: 6px; }
        .btn { margin-top: 20px; padding: 10px 25px; background: #0ff; color: #000; text-decoration: none; font-weight: bold; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="p-box" id="player-container">Membaca data dari API...</div>
    <a href="https://t.me/dramaxofort_bot" class="btn">Kembali ke Bot</a>

    <script>
        const u = new URLSearchParams(window.location.search);
        const s = u.get('srv'), id = u.get('id'), e = u.get('eps');

        if (s && id && e) {
            let apiLink = "";
            // Menentukan URL API berdasarkan server
            if (s === "melolo") apiLink = `https://api.sonzaix.indevs.in/melolo/stream/${e}`;
            else if (s === "meloshort") apiLink = `https://api.sonzaix.indevs.in/meloshort/stream?dramaId=${id}&episodeId=${e}`;
            else if (s === "goodshort") apiLink = `https://api.sonzaix.indevs.in/goodshort/stream?bookId=${e}`;
            else if (s === "dramawave") apiLink = `https://api.sonzaix.indevs.in/dramawave/stream?dramaId=${id}&episode=${e}`;
            else if (s === "reelshort") apiLink = `https://api.sonzaix.indevs.in/reelshort/stream?bookId=${id}&chapterId=${e}`;
            else if (s === "freereels") apiLink = `https://api.sonzaix.indevs.in/freereels/stream?dramaId=${id}&episode=${e}`;
            else if (s === "netshort") apiLink = `https://api.sonzaix.indevs.in/netshort/stream?dramaId=${e}`;
            else if (s === "dramabox") apiLink = `https://api.sonzaix.indevs.in/dramabox/stream?dramaId=${id}&episodeIndex=${e}`;

            // Mengambil data JSON dari API
            fetch(apiLink)
                .then(response => response.json())
                .then(data => {
                    // Cek apakah API memberikan respons error "Video Not Found"
                    if (data.error || data.message === "error") {
                        document.getElementById('player-container').innerHTML = `❌ Error dari Server: ${data.error || 'Video tidak ditemukan'}`;
                        return;
                    }

                    // Mencari letak link video asli di dalam struktur JSON
                    let realVideoUrl = data.data?.url || data.data?.video_url || data.data?.play_url || data.url || data.video_url || data.data?.stream_url;

                    if (realVideoUrl) {
                        // Jika link asli ketemu, buat pemutar video
                        document.getElementById('player-container').innerHTML = `
                            <video controls autoplay>
                                <source src="${realVideoUrl}" type="video/mp4">
                                Browser Anda tidak mendukung pemutar video ini.
                            </video>
                        `;
                    } else {
                        // Jika API sukses tapi formatnya aneh, tampilkan isinya agar kita bisa cek
                        document.getElementById('player-container').innerHTML = `
                            ⚠️ Video link tidak terbaca. Isi data dari API:<br>
                            <textarea style="width:100%; height:100px; margin-top:10px; color:black;">${JSON.stringify(data)}</textarea>
                        `;
                    }
                })
                .catch(err => {
                    document.getElementById('player-container').innerHTML = `❌ Gagal memuat API (Network/CORS): ${err.message}`;
                });
        } else {
            document.getElementById('player-container').innerHTML = "❌ Parameter URL dari bot tidak lengkap.";
        }
    </script>
</body>
</html>
