<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dramaxofort Player</title>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .player-box { width: 95%; max-width: 850px; aspect-ratio: 16/9; background: #111; border: 2px solid #00ffff; border-radius: 12px; overflow: hidden; box-shadow: 0 0 25px rgba(0,255,255,0.3); }
        iframe { width: 100%; height: 100%; border: none; }
        .btn { margin-top: 25px; padding: 12px 35px; background: #00ffff; color: #000; text-decoration: none; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #00cccc; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="player-box" id="p">⏳ Memuat Video...</div>
    <div style="margin-top:20px; text-align:center;">
        <h1 style="color:#00ffff; font-size:1.4rem; margin:0; letter-spacing:2px;">DRAMAXOFORT PLAYER</h1>
        <p id="m" style="color:#888; margin:10px 0 20px;">Server: - | Episode: -</p>
        <a href="https://t.me/dramaxofort_bot" class="btn">KEMBALI KE BOT</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const srv = params.get('srv');
        const id = params.get('id');
        const eps = params.get('eps');

        if (srv && id && eps) {
            document.getElementById('m').innerText = `Server: ${srv.toUpperCase()} | Episode: ${eps}`;
            let vUrl = "";

            // --- LOGIKA FIX ENDPOINT NOT FOUND ---
            // 1. Cek tipe pemanggilan (Path atau Query)
            if (srv === "melolo" || srv === "dramabox") {
                // Server ini biasanya pakai format /srv/video/id/eps
                vUrl = `https://api.sonzaix.indevs.in/${srv}/video/${id}/${eps}`;
            } 
            else {
                // Server lainnya pakai format query (?key=id&eps=eps)
                let key = "id"; // Default untuk dramawave, freereels, dll
                if (["meloshort", "freereels", "netshort"].includes(srv)) key = "dramaId";
                if (["goodshort", "reelshort"].includes(srv)) key = "bookId";

                vUrl = `https://api.sonzaix.indevs.in/${srv}/video?${key}=${id}&eps=${eps}`;
            }
            
            // Masukkan ke iframe
            document.getElementById('p').innerHTML = `<iframe src="${vUrl}" allowfullscreen></iframe>`;
        } else {
            document.getElementById('p').innerHTML = `<div style="padding:20px; text-align:center;">❌ Link tidak valid atau data kurang lengkap.</div>`;
        }
    </script>
</body>
</html>
