<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dramaxofort Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; color: white; font-family: sans-serif; text-align: center; }
        .p-box { width: 100%; height: 100vh; max-width: 450px; background: #000; display: flex; justify-content: center; align-items: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }
    </style>
</head>
<body>
    <div class="p-box" id="player-container">
        <span style="color:#0ff;">⏳ Menarik Gambar Video...</span>
    </div>

    <script>
        const u = new URLSearchParams(window.location.search);
        const s = u.get('srv'), id = u.get('id'), e = u.get('eps');

        if (s && id && e) {
            let apiLink = "";
            if (s === "melolo") apiLink = `https://api.sonzaix.indevs.in/melolo/stream/${e}`;
            else if (s === "meloshort") apiLink = `https://api.sonzaix.indevs.in/meloshort/stream?dramaId=${id}&episodeId=${e}`;
            else if (s === "goodshort") apiLink = `https://api.sonzaix.indevs.in/goodshort/stream?bookId=${e}`;
            else if (s === "dramawave") apiLink = `https://api.sonzaix.indevs.in/dramawave/stream?dramaId=${id}&episode=${e}`;
            else if (s === "reelshort") apiLink = `https://api.sonzaix.indevs.in/reelshort/stream?bookId=${id}&chapterId=${e}`;
            else if (s === "freereels") apiLink = `https://api.sonzaix.indevs.in/freereels/stream?dramaId=${id}&episode=${e}`;
            else if (s === "netshort") apiLink = `https://api.sonzaix.indevs.in/netshort/stream?dramaId=${e}`;
            else if (s === "dramabox") apiLink = `https://api.sonzaix.indevs.in/dramabox/stream?dramaId=${id}&episodeIndex=${e}`;

            fetch(apiLink)
                .then(r => r.json())
                .then(data => {
                    let vidUrl = "";
                    function scan(obj) {
                        if (vidUrl) return;
                        if (obj.h264) { vidUrl = obj.h264; return; }
                        if (obj.play_url) { vidUrl = obj.play_url; return; }
                        if (obj.video_url) { vidUrl = obj.video_url; return; }
                        if (obj.url && typeof obj.url === 'string' && obj.url.includes('http')) { vidUrl = obj.url; return; }
                        for (let k in obj) {
                            if (typeof obj[k] === 'string' && (obj[k].includes('.mp4') || obj[k].includes('.m3u8')) && obj[k].startsWith('http')) {
                                vidUrl = obj[k]; return;
                            } else if (typeof obj[k] === 'object' && obj[k] !== null) { scan(obj[k]); }
                        }
                    }
                    scan(data);

                    if (vidUrl) {
                        const box = document.getElementById('player-container');
                        box.innerHTML = `<video id="my-video" controls autoplay playsinline webkit-playsinline></video>`;
                        const video = document.getElementById('my-video');
                        
                        // ALARM ERROR: Jika video gagal dimuat / muter-muter
                        video.addEventListener('error', () => {
                            let err = "Akses ditolak oleh Server Video (CORS)";
                            if(video.error && video.error.code === 2) err = "Koneksi Jaringan Terputus";
                            else if (video.error && video.error.code === 3) err = "Format Video Rusak";
                            
                            box.innerHTML = `<div style="padding:20px;">❌ <b>Video Gagal Diputar</b><br><br><small>${err}</small><br><br><a href="${vidUrl}" target="_blank" style="color:#0ff; text-decoration:none; padding:10px 20px; border:1px solid #0ff; border-radius:10px; display:inline-block; margin-top:15px;">🔗 Buka Link Asli</a></div>`;
                        });

                        if (vidUrl.includes('.m3u8')) {
                            if (Hls.isSupported()) {
                                const hls = new Hls();
                                hls.loadSource(vidUrl);
                                hls.attachMedia(video);
                                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                                
                                // Deteksi error khusus M3U8
                                hls.on(Hls.Events.ERROR, function (event, data) {
                                    if (data.fatal) {
                                        box.innerHTML = `<div style="padding:20px;">❌ <b>Server Lemot / Ditolak</b><br><br><small>Gunakan tombol 'Buka di Chrome' pada pojok kanan atas Telegram.</small></div>`;
                                    }
                                });
                            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                                video.src = vidUrl;
                                video.addEventListener('loadedmetadata', () => video.play());
                            }
                        } else {
                            video.src = vidUrl;
                            video.play();
                        }
                    } else {
                        document.getElementById('player-container').innerHTML = `<span style="color:red;">⚠️ Video sudah dihapus oleh pihak server.</span>`;
                    }
                })
                .catch(err => {
                    document.getElementById('player-container').innerHTML = `<span style="color:red;">❌ Gagal terhubung ke API pusat.</span>`;
                });
        }
    </script>
</body>
</html>
