<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Dramaxofort Player</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .p-box { width: 100%; height: 100vh; max-width: 450px; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }
        :root { --plyr-color-main: #00ffff; }
        .loading-text { color:#0ff; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; width:100%; font-weight:bold; }
        .btn-direct { background: #00ffff; color: #000; padding: 12px 20px; border-radius: 30px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 15px; font-size: 14px;}
    </style>
</head>
<body>
    <div class="p-box" id="player-container">
        <div class="loading-text" id="status-text">⏳ Membuka Brankas Video...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <script>
        const u = new URLSearchParams(window.location.search);
        const s = u.get('srv'), id = u.get('id'), e = u.get('eps');

        if (s && id && e) {
            let apiLink = "";
            if (s === "melolo") apiLink = "https://api.sonzaix.indevs.in/melolo/stream/" + e;
            else if (s === "meloshort") apiLink = "https://api.sonzaix.indevs.in/meloshort/stream?dramaId=" + id + "&episodeId=" + e;
            else if (s === "goodshort") apiLink = "https://api.sonzaix.indevs.in/goodshort/stream?bookId=" + e;
            else if (s === "dramawave") apiLink = "https://api.sonzaix.indevs.in/dramawave/stream?dramaId=" + id + "&episode=" + e;
            else if (s === "reelshort") apiLink = "https://api.sonzaix.indevs.in/reelshort/stream?bookId=" + id + "&chapterId=" + e;
            else if (s === "freereels") apiLink = "https://api.sonzaix.indevs.in/freereels/stream?dramaId=" + id + "&episode=" + e;
            else if (s === "netshort") apiLink = "https://api.sonzaix.indevs.in/netshort/stream?dramaId=" + id + "&episodeId=" + e + "&id=" + e + "&episode=" + e;
            else if (s === "dramabox") apiLink = "https://api.sonzaix.indevs.in/dramabox/stream?dramaId=" + id + "&episodeIndex=" + e;

            fetch(apiLink)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    
                    // MESIN PENCARI 3 LAPIS (Sangat Agresif)
                    let vidUrl = "";
                    const keys = ['h264', 'play_url', 'video_url', 'stream_url', 'url', 'src', 'm3u8', 'mp4_url', 'videoUrl', 'playUrl', 'link', 'file', 'video'];
                    
                    function searchLapis1(o) {
                        if (vidUrl) return;
                        if (typeof o === 'object' && o !== null) {
                            for (let i = 0; i < keys.length; i++) {
                                let k = keys[i];
                                if (o[k] && typeof o[k] === 'string' && o[k].indexOf('http') === 0) { vidUrl = o[k]; return; }
                            }
                            for (let k in o) searchLapis1(o[k]);
                        }
                    }
                    searchLapis1(data);

                    if (!vidUrl) {
                        function searchLapis2(o) {
                            if (vidUrl) return;
                            if (typeof o === 'object' && o !== null) {
                                for (let k in o) {
                                    if (typeof o[k] === 'string' && o[k].indexOf('http') === 0 && (o[k].indexOf('.mp4') !== -1 || o[k].indexOf('.m3u8') !== -1)) { vidUrl = o[k]; return; }
                                    if (typeof o[k] === 'object') searchLapis2(o[k]);
                                }
                            }
                        }
                        searchLapis2(data);
                    }

                    if (!vidUrl) {
                        function searchLapis3(o) {
                            if (vidUrl) return;
                            if (typeof o === 'object' && o !== null) {
                                for (let k in o) {
                                    if (typeof o[k] === 'string' && o[k].indexOf('http') === 0 && o[k].indexOf('api.sonzaix') === -1) { vidUrl = o[k]; return; }
                                    if (typeof o[k] === 'object') searchLapis3(o[k]);
                                }
                            }
                        }
                        searchLapis3(data);
                    }

                    if (vidUrl) {
                        const box = document.getElementById('player-container');
                        box.innerHTML = '<video id="my-video" controls playsinline webkit-playsinline></video>';
                        const video = document.getElementById('my-video');
                        
                        const player = new Plyr(video, {
                            controls: ['play-large', 'play', 'progress', 'current-time', 'duration', 'mute', 'volume', 'settings', 'fullscreen'],
                            settings: ['speed'], speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
                        });

                        function showErrorPanel() {
                            let safeLink = vidUrl.indexOf('.m3u8') !== -1 ? "https://hlsjs.video-dev.org/demo/?src=" + encodeURIComponent(vidUrl) : vidUrl;
                            box.innerHTML = '<div style="padding:20px; color:white; text-align:center;">❌ <b>Browser Telegram Diblokir</b><br><br><small>Gunakan Web Player Darurat agar video berputar tanpa di-download.</small><br><a href="' + safeLink + '" target="_blank" class="btn-direct">🚀 BUKA PLAYER DARURAT</a></div>';
                        }
                        video.addEventListener('error', showErrorPanel);

                        player.on('ended', function() {
                            let overlay = document.createElement('div');
                            overlay.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:99;display:flex;align-items:center;justify-content:center;color:#0ff;flex-direction:column;text-align:center;padding:20px;box-sizing:border-box;';
                            overlay.innerHTML = '<h2>⏭️ Mencari Episode Selanjutnya...</h2>';
                            box.appendChild(overlay);
                            
                            const cPaths = {
                                "melolo": { p: "id", path: true }, "meloshort": { p: "dramaId", path: false },
                                "goodshort": { p: "bookId", path: false }, "dramawave": { p: "id", path: false },
                                "reelshort": { p: "bookId", path: false }, "freereels": { p: "dramaId", path: false },
                                "netshort": { p: "dramaId", path: false }, "dramabox": { p: "id", path: true }
                            };
                            let c = cPaths[s];
                            let detailUrl = c.path ? "https://api.sonzaix.indevs.in/" + s + "/detail/" + id : "https://api.sonzaix.indevs.in/" + s + "/detail?" + c.p + "=" + id;
                            
                            fetch(detailUrl).then(function(res){return res.json()}).then(function(ddata) {
                                function getEpListJS(d) {
                                    if(Array.isArray(d) && d.length > 0 && typeof d[0] === 'object') return d;
                                    if(typeof d === 'object' && d !== null) {
                                        let keysCheck = ['episodes', 'episode_list', 'video_list', 'list', 'chapter_list', 'chapters', 'videos', 'data'];
                                        for(let i=0; i<keysCheck.length; i++) {
                                            if(d[keysCheck[i]] && Array.isArray(d[keysCheck[i]]) && d[keysCheck[i]].length > 0) return d[keysCheck[i]];
                                        }
                                        for(let k in d) {
                                            if(typeof d[k] === 'object') {
                                                let r = getEpListJS(d[k]);
                                                if(r.length > 0) return r;
                                            }
                                        }
                                    }
                                    return [];
                                }

                                function extractIdSafe(nx) {
                                    if (nx.episodeId !== undefined && nx.episodeId !== null) return String(nx.episodeId);
                                    if (nx.chapterId !== undefined && nx.chapterId !== null) return String(nx.chapterId);
                                    if (nx.id !== undefined && nx.id !== null) return String(nx.id);
                                    if (nx.video_id !== undefined && nx.video_id !== null) return String(nx.video_id);
                                    if (nx.drama_id !== undefined && nx.drama_id !== null) return String(nx.drama_id);
                                    if (nx.episodeIndex !== undefined && nx.episodeIndex !== null) return String(nx.episodeIndex);
                                    if (nx.index !== undefined && nx.index !== null) return String(nx.index);
                                    if (nx.episode !== undefined && nx.episode !== null) return String(nx.episode);
                                    if (nx.serial_number !== undefined && nx.serial_number !== null) return String(nx.serial_number);
                                    return null;
                                }

                                let epsList = getEpListJS(ddata.data || ddata);
                                if(epsList.length > 0) {
                                    let currentEpsParams = String(e).trim();
                                    let cIdx = epsList.findIndex(function(ep, index) {
                                        let possibleValues = [ep.episodeId, ep.chapterId, ep.id, ep.video_id, ep.drama_id, ep.episodeIndex, ep.index, ep.episode, ep.serial_number, (index + 1)];
                                        for(let j=0; j<possibleValues.length; j++){
                                            if(possibleValues[j] != null && String(possibleValues[j]).trim() === currentEpsParams) return true;
                                        }
                                        return false;
                                    });
                                    
                                    if(cIdx !== -1) {
                                        if (cIdx + 1 < epsList.length) {
                                            let nx = epsList[cIdx + 1];
                                            let nextId = extractIdSafe(nx);
                                            if(!nextId) nextId = cIdx + 2; 
                                            
                                            overlay.innerHTML = '<h2>🔄 Mengalihkan...</h2>';
                                            setTimeout(function() {
                                                window.location.href = "?srv=" + s + "&id=" + id + "&eps=" + nextId;
                                            }, 800);
                                        } else {
                                            overlay.innerHTML = '<h2 style="color:#0f0;">✅ TAMAT</h2><p style="color:white;">Ini adalah episode terakhir.</p>';
                                        }
                                    } else {
                                        overlay.innerHTML = '<h2 style="color:yellow;">⚠️ Urutan Terputus</h2><p style="color:white;">Silakan kembali ke Bot Telegram.</p>';
                                    }
                                } else {
                                    overlay.innerHTML = '<h2 style="color:red;">❌ Data Gagal Dimuat</h2>';
                                }
                            }).catch(function(err) {
                                overlay.innerHTML = '<h2 style="color:red;">❌ Server Terputus</h2>';
                            });
                        });

                                hls.on(Hls.Events.ERROR, function (event, data) { if (data.fatal) showErrorPanel(); });
                            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                                video.src = vidUrl; video.addEventListener('loadedmetadata', function() { player.play(); });
                            }
                        } else {
                            video.src = vidUrl; player.play();

                                '<h3 style="color:yellow; margin-top:0;">[DEBUG] DATA SERVER API</h3>' +

                                    'API LINK:\n' + apiLink + '\n\nDATA:\n' + JSON.stringify(data, null, 2) +
                                '</textarea>' +
                            '</div>';
                    }
                })
                .catch(function(err) {

                });
        }
    </script>
</body>
