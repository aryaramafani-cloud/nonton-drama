<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dramaxofort Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { 
            margin: 0; background: #000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh; overflow: hidden; 
        }
        /* UKURAN LAYAR TIKTOK (9:16) BERSIH TANPA TOMBOL */
        .p-box { 
            width: 100%; height: 100vh; max-width: 450px; background: #000; 
            display: flex; justify-content: center; align-items: center; position: relative; 
        }
    </style>
</head>
<body>
    <div class="p-box" id="player-container">
        <span style="color:#0ff; font-family:sans-serif;">⏳ Menarik Gambar Video...</span>
    </div>

    <script>
        const u = new URLSearchParams(window.location.search);
        const s = u.get('srv'), id = u.get('id'), e = u.get('eps');

        if (s && id && e) {
            let apiLink = "";
            if (s === "melolo") apiLink = `https://api.sonzaix.indevs.in/melolo/stream/${e}`;
            else if (s === "meloshort") apiLink = `https://api.sonzaix.indevs.in/meloshort/stream?dramaId=${id}&episodeId=${e}`;
            else if (s === "goodshort") apiLink = `https://api.sonzaix.indevs.in/goodshort/stream?bookId=${e}`;
            else if (s === "dramawave") apiLink = `https://api.sonzaix.indevs.in/dramawave/stream?dramaId=${id}&episode=${e}`;
            else if (s === "reelshort") apiLink = `https://api.sonzaix.indevs.in/reelshort/stream?bookId=${id}&chapterId=${e}`;
            else if (s === "freereels") apiLink = `https://api.sonzaix.indevs.in/freereels/stream?dramaId=${id}&episode=${e}`;
            else if (s === "netshort") apiLink = `https://api.sonzaix.indevs.in/netshort/stream?dramaId=${e}`;
            else if (s === "dramabox") apiLink = `https://api.sonzaix.indevs.in/dramabox/stream?dramaId=${id}&episodeIndex=${e}`;

            fetch(apiLink)
                .then(r => r.json())
                .then(data => {
                    let vidUrl = "";
                    if (data.data && data.data.h264) vidUrl = data.data.h264;
                    else if (data.data && data.data.video_list && data.data.video_list.h264) vidUrl = data.data.video_list.h264;
                    else if (data.data && data.data.url) vidUrl = data.data.url;
                    else if (data.h264) vidUrl = data.h264;

                    if (!vidUrl) {
                        function scan(obj) {
                            if (vidUrl) return;
                            for (let k in obj) {
                                if (typeof obj[k] === 'string' && (obj[k].includes('.mp4') || obj[k].includes('.m3u8')) && obj[k].startsWith('http')) {
                                    vidUrl = obj[k]; return;
                                } else if (typeof obj[k] === 'object' && obj[k] !== null) { scan(obj[k]); }
                            }
                        }
                        scan(data);
                    }

                    if (vidUrl) {
                        const box = document.getElementById('player-container');
                        // MEMAKSA GAMBAR MUNCUL FULL SCREEN TIKTOK
                        box.innerHTML = `<video id="my-video" controls autoplay playsinline webkit-playsinline style="width:100%; height:100%; object-fit:contain; background:#000;"></video>`;
                        const video = document.getElementById('my-video');

                        if (vidUrl.includes('.m3u8')) {
                            if (Hls.isSupported()) {
                                const hls = new Hls();
                                hls.loadSource(vidUrl);
                                hls.attachMedia(video);
                                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                                video.src = vidUrl;
                                video.addEventListener('loadedmetadata', () => video.play());
                            }
                        } else {
                            video.src = vidUrl;
                            video.play();
                        }
                    } else {
                        document.getElementById('player-container').innerHTML = `<span style="color:red;">⚠️ Gagal menemukan file video.</span>`;
                    }
                });
        }
    </script>
</body>
</html>
